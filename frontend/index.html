<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PDF AI — Análise Inteligente de Documentos | Marvin Costa</title>
  <meta name="description" content="Motor de análise inteligente de PDFs com IA local. Classifica, extrai e resume currículos, notas fiscais, contratos e mais.">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">

  <!-- Styles -->
  <link rel="stylesheet" href="assets/css/main.css">
  <link rel="stylesheet" href="assets/css/animations.css">
  <link rel="stylesheet" href="assets/css/components.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📄</text></svg>">
</head>

<body>
  <!-- Aurora Background -->
  <div class="aurora-bg">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
  </div>
  <div class="grid-overlay"></div>

  <!-- Navigation -->
  <nav class="navbar">
    <a href="index.html" class="nav-brand">
      <div class="nav-logo">PDF</div>
      <div class="nav-title">PDF AI <span>Marvin Costa</span></div>
    </a>
    <div class="nav-links">
      <a href="arquitetura.html" class="nav-link">Arquitetura</a>
      <a href="stacks.html" class="nav-link stacks">Stacks Técnicas <span class="link-arrow">→</span></a>
    </div>
  </nav>

  <!-- Main Content -->
  <div class="main-wrapper">
    <div class="glass-panel" id="mainCard">
      <header>
        <h1>Análise Inteligente de Documentos</h1>
        <div class="subtitle">Motor Cognitivo com PyMuPDF + Ollama (Qwen / Phi-3)</div>
      </header>

      <div id="statusMsg" class="status-msg"></div>

      <!-- Upload Form -->
      <form id="pdfForm">
        <label class="upload-zone" id="dropZone" for="pdfFile">
          <div class="upload-icon">📄</div>
          <div class="upload-text">Arraste seu PDF ou clique para selecionar</div>
          <div class="upload-hint" id="fileLabel">Suporta: Currículos, Notas Fiscais, Extratos, Certificados, Contratos, Laudos...</div>
        </label>
        <input type="file" id="pdfFile" name="file" accept=".pdf" required>
        <button type="submit" id="submitBtn" class="btn-submit">🚀 Iniciar Análise</button>
      </form>

      <!-- Progress Bar -->
      <div id="progressContainer" class="progress-container">
        <div class="progress-bar">
          <div id="progressFill" class="progress-fill"></div>
        </div>
        <div id="progressLabel" class="progress-label">Iniciando...</div>
      </div>

      <!-- Results HUD -->
      <div id="resultsArea" class="hud-container">
        <!-- Header -->
        <div class="hud-header">
          <div class="hud-meta">
            <div id="docBadge" class="doc-badge">DOCUMENTO</div>
            <div id="methodBadge" class="method-badge ai">🤖 IA</div>
          </div>
          <div id="hudStats" class="hud-stats"></div>
        </div>

        <!-- Summary -->
        <div class="summary-card">
          <span class="hud-label">📝 Resumo da Análise</span>
          <p id="summaryText" class="summary-text">Carregando...</p>
        </div>

        <!-- Data Grid -->
        <div id="hudGrid" class="hud-grid"></div>

        <!-- Actions -->
        <div class="actions-bar">
          <button class="btn-action primary" onclick="copyJSON()">📋 Copiar JSON</button>
          <button class="btn-action" onclick="downloadJSON()">💾 Exportar JSON</button>
          <button class="btn-action" onclick="newAnalysis()">🔄 Nova Análise</button>
        </div>
      </div>

      <!-- Footer -->
      <footer class="site-footer">
        <div class="footer-links">
          <a href="https://linkedin.com/in/marvincost" target="_blank" class="footer-link">💼 LinkedIn</a>
          <a href="https://github.com/marvincoast" target="_blank" class="footer-link">🐙 GitHub</a>
        </div>
        <div class="copyright">Desenvolvido por Marvin Costa • 2026</div>
      </footer>
    </div>
  </div>

  <script src="assets/js/app.js?v=4"></script>
</body>

</html>
