version: "3.8"

services:
  pdf-service:
    build: .
    container_name: pdf-svc
    ports:
      - "8080:8080"
    environment:
      - OLLAMA_API=http://host.docker.internal:11434
      - LLM_MODEL=phi3:mini
      - MAX_FILE_SIZE_MB=15
      - MAX_TEXT_CHARS=4000
      - OLLAMA_TIMEOUT=90
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3

